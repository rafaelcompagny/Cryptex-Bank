<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Rafael Bank</title>
  <link rel="shortcut icon" href="img/logo.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h2>Accueil</h2>
        <p class="small" id="welcomeUser">Bienvenue</p>
      </div>
      <div class="top-actions">
        <a class="btn-link secondary" href="login.html" onclick="logout()">Se déconnecter</a>
      </div>
    </div>

    <div class="card">
      <p class="small">Solde principal</p>
      <h2 id="balance">0.00 €</h2>
      <p class="small" id="clickLevelText">Gain par clic : 1 €</p>
    </div>

    <div class="row">
      <button onclick="clickMoney()">+1 clic</button>
      <button onclick="claimDailyBonus()">Bonus journalier</button>
      <button onclick="upgradeClickIncome()">Améliorer le clic</button>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Progression</h3>
      <p id="clickUpgradeInfo"></p>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Crédits</h3>
      <div class="row">
        <button onclick="takeLoan(500)">Crédit 500 €</button>
        <button onclick="takeLoan(2000)">Crédit 2 000 €</button>
        <button onclick="takeLoan(10000)">Crédit 10 000 €</button>
        <button class="secondary" onclick="repayLoanManual()">Rembourser 100 €</button>
      </div>
      <p id="loanInfo"></p>
      <div id="loanList"></div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Comptes</h3>
      <div id="accountsList"></div>
      <div class="row">
        <button onclick="addSubAccount()">Ajouter un compte</button>
        <button class="secondary" onclick="switchSubAccount()">Changer de compte</button>
      </div>
    </div>

    <h3 style="margin-top:20px;">Historique global</h3>
    <div id="history"></div>
  </div>

  <nav>
    <a href="home.html">Accueil</a>
    <a href="cards.html">Cartes</a>
    <a href="payments.html">Paiement</a>
    <a href="crypto.html">Crypto</a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
